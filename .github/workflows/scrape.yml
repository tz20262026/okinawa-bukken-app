name: 沖縄不動産 新着物件自動収集

on:
  schedule:
    # 毎日 JST 09:00 (UTC 00:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: Playwright Chromium インストール
        run: npx playwright install chromium --with-deps

      - name: スクレイパー実行（JSON更新）
        run: node scripts/daily_scraper.js

      - name: verdict 再計算
        run: node scripts/recompute_verdict.js

      - name: LINE通知（-40%超の割安物件）
        run: node scripts/notify_line.js
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}

      - name: properties.json をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/properties.json
          git add -u
          if git diff --cached --quiet; then
            echo "変更なし - コミットをスキップ"
            exit 0
          fi
          COUNT=$(node -e "const d=require('./data/properties.json');console.log(d.length)")
          git commit -m "chore: 物件データ自動更新 $(date '+%Y-%m-%d') 合計${COUNT}件"
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep $((i * 15))
          done
          exit 1
